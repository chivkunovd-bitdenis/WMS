name: Deploy Production

# Push to main → deploy immediately (~1–2 min). No CI gate.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy on server (git pull + docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${WMS_REPO_DIR:-/opt/wms}"
            git config --global --add safe.directory "${WMS_REPO_DIR:-/opt/wms}"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            ./scripts/deploy/prod-update.sh

      - name: Smoke check (HTTP 200)
        run: |
          set -euo pipefail
          HOST="${{ secrets.DEPLOY_SSH_HOST }}"
          PORT="${{ secrets.DEPLOY_HTTP_PORT || '8088' }}"
          for path in "/" "/seller/" "/api/health"; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" "http://${HOST}:${PORT}${path}" || echo "000")
            echo "${path} -> ${code}"
            test "${code}" = "200"
          done
