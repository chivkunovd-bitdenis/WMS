# Порты на хосте по умолчанию вынесены из «типичных» 8000/5173/5432 — см. README.
# Переопределение: WMS_DB_PORT, WMS_API_PORT, WMS_WEB_PORT в .env или в shell.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${WMS_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg_async://postgres:postgres@db:5432/wms
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WMS_API_PORT:-18080}:8000"

  web:
    build:
      context: ./frontend
    environment:
      # Прокси Vite внутри сети compose (браузер → :15173 → /api → api:8000)
      VITE_API_PROXY: http://api:8000
    depends_on:
      - api
    ports:
      - "${WMS_WEB_PORT:-15173}:5173"
