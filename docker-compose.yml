services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Host 5433: избегаем конфликта с локальным PostgreSQL на :5432
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg_async://postgres:postgres@db:5432/wms
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "5173:5173"

