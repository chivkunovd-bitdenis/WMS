# Порты на хосте по умолчанию вынесены из «типичных» 8000/5173/5432 — см. README.
# Переопределение: WMS_DB_PORT, WMS_API_PORT, WMS_WEB_PORT в .env или в shell.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${WMS_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "${WMS_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg_async://postgres:postgres@db:5432/wms
      CELERY_BROKER_URL: redis://redis:6379/0
      # Test bootstrap: stable credentials for local docker environment.
      WMS_BOOTSTRAP_ADMIN: "1"
      WMS_BOOTSTRAP_ADMIN_EMAIL: "admin@test.example.com"
      WMS_BOOTSTRAP_ADMIN_PASSWORD: "password123"
      WMS_BOOTSTRAP_ORG_NAME: "WMS Test"
      WMS_BOOTSTRAP_ORG_SLUG: "wms-test"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WMS_API_PORT:-18080}:8000"

  celery_worker:
    build:
      context: ./backend
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && celery -A app.celery_app worker --loglevel=info",
      ]
    environment:
      DATABASE_URL: postgresql+psycopg_async://postgres:postgres@db:5432/wms
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    depends_on:
      - api
    ports:
      - "${WMS_WEB_PORT:-15173}:80"
    volumes:
      - ./frontend/deploy/Caddyfile.local:/etc/caddy/Caddyfile:ro
